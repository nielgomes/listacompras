name: listacompras2
description: Lista de Compras - Sincronização em tempo real entre dispositivos
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Firebase (Sincronização em Tempo Real)
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.7.0
  
  # Gerenciamento de Estado (MobX)
  mobx: ^2.4.0
  flutter_mobx: ^2.2.1+1
  
  # Variáveis de Ambiente
  flutter_dotenv: ^6.0.1
  
  # HTTP (OpenRouter API)
  http: ^1.5.0
  
  # Utilitários
  path_provider: ^2.1.4  # Versão compatível com SDK 34
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # MobX Code Generation
  mobx_codegen: ^2.6.1
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - icons/

flutter_dotenv:
  filename: .env
  optional: true
